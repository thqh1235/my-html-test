<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEATDROP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --s1: #0e0e14;
  --s2: #16161f;
  --s3: #1e1e2a;
  --pink: #ff2d6b;
  --cyan: #00e5c8;
  --yellow: #ffe240;
  --text: #eeeef5;
  --muted: #55556a;
  --border: rgba(255,255,255,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 55% 50% at 10% 50%, rgba(255,45,107,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 90% 60%, rgba(0,229,200,0.05) 0%, transparent 60%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  pointer-events: none;
  z-index: 100;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ══ 로비 ══ */
#screen-lobby {
  width: 100%;
  max-width: 980px;
  display: grid;
  grid-template-columns: 1fr 480px;
  align-items: center;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

.left {
  display: flex; flex-direction: column; align-items: flex-start;
  padding-right: 48px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 110px; letter-spacing: 8px; line-height: 0.88;
  background: linear-gradient(150deg, var(--pink) 0%, #ff7040 45%, var(--yellow) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 50px rgba(255,45,107,0.3));
}

.logo-sub { font-size:11px; letter-spacing:5px; color:var(--muted); text-transform:uppercase; margin-top:14px; }
.logo-deco { width:56px; height:2px; background:linear-gradient(90deg,var(--pink),transparent); margin-top:20px; }

.right { display:flex; flex-direction:column; gap:12px; }

/* ── 인풋 카드 ── */
.input-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative; overflow: hidden;
}

.input-card::before {
  content: ''; position: absolute; top:0; left:8%; right:8%; height:1px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  opacity: 0.4;
}

.inp-row { display:flex; gap:10px; margin-bottom: 14px; }

.inp-wrap { position:relative; flex:1; }
.inp-wrap.name-wrap { flex: 0 0 130px; }

.inp {
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 36px 13px 38px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; outline: none; width: 100%;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.inp::placeholder { color:var(--muted); font-size:12px; }

.inp-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  font-size:14px; opacity:0.35; pointer-events:none;
  transition: opacity 0.3s, filter 0.3s;
}

.inp-check {
  position:absolute; right:11px; top:50%; transform:translateY(-50%) scale(0);
  font-size:14px; pointer-events:none; font-weight:bold;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

/* 링크 FILLED */
.inp-wrap.link-wrap.filled .inp-icon { opacity:1; filter:drop-shadow(0 0 5px var(--cyan)); }
.inp-wrap.link-wrap.filled .inp {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,200,0.08), 0 0 18px rgba(0,229,200,0.1);
  background: rgba(0,229,200,0.03);
}
.inp-wrap.link-wrap.filled .inp-check { transform:translateY(-50%) scale(1); color:var(--cyan); }

/* 닉네임 FILLED */
.inp-wrap.name-wrap.filled .inp-icon { opacity:1; filter:drop-shadow(0 0 5px var(--pink)); }
.inp-wrap.name-wrap.filled .inp {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,45,107,0.08), 0 0 18px rgba(255,45,107,0.1);
  background: rgba(255,45,107,0.03);
}
.inp-wrap.name-wrap.filled .inp-check { transform:translateY(-50%) scale(1); color:var(--pink); }

/* 포커스 (미입력) */
.inp-wrap:not(.filled) .inp:focus { border-color:rgba(255,255,255,0.15); box-shadow:0 0 0 3px rgba(255,255,255,0.04); }

/* ── 스텝 인디케이터 ── */
.step-row { display:flex; align-items:center; gap:8px; }

.step {
  display:flex; align-items:center; gap:6px;
  font-size:10px; letter-spacing:1px; color:var(--muted);
  transition: color 0.3s;
  white-space: nowrap;
}

.step-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--s3); border:1.5px solid var(--muted);
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  flex-shrink:0;
}

.step-line { flex:1; height:1px; background:var(--border); transition:background 0.4s; }

/* step done */
.step.s-link.done { color:var(--cyan); }
.step.s-link.done .step-dot { background:var(--cyan); border-color:var(--cyan); box-shadow:0 0 8px rgba(0,229,200,0.6); }
.step-line.l1.done { background:rgba(0,229,200,0.25); }

.step.s-name.done { color:var(--pink); }
.step.s-name.done .step-dot { background:var(--pink); border-color:var(--pink); box-shadow:0 0 8px rgba(255,45,107,0.6); }
.step-line.l2.done { background:rgba(255,45,107,0.25); }

.step.s-go.done { color:var(--yellow); }
.step.s-go.done .step-dot { background:var(--yellow); border-color:var(--yellow); box-shadow:0 0 8px rgba(255,226,64,0.6); }

/* ── 탭 ── */
.tab-wrap {
  background:var(--s1); border:1px solid var(--border);
  border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
}

.tab-header { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--border); }

.tab-btn {
  padding:14px; background:none; border:none; color:var(--muted);
  font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; letter-spacing:1px;
  transition:color 0.2s, background 0.2s; position:relative;
}
.tab-btn.active { color:var(--text); background:var(--s2); }
.tab-btn.active::after {
  content:''; position:absolute; bottom:0; left:15%; right:15%;
  height:2px; border-radius:2px; background:var(--cyan); box-shadow:0 0 8px var(--cyan);
}
.tab-btn:last-child.active::after { background:var(--yellow); box-shadow:0 0 8px var(--yellow); }

.tab-panel { height:260px; overflow-y:auto; padding:16px 18px; display:none; }
.tab-panel.active { display:block; }
.tab-panel::-webkit-scrollbar { width:4px; }
.tab-panel::-webkit-scrollbar-track { background:transparent; }
.tab-panel::-webkit-scrollbar-thumb { background:var(--s3); border-radius:4px; }

.panel-header {
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
  position:sticky; top:0; background:var(--s1); padding-bottom:8px; z-index:2;
}
.panel-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.panel-line { flex:1; height:1px; background:var(--border); }

.mode-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:10px; padding:3px 9px; border-radius:20px; white-space:nowrap;
  background:rgba(255,226,64,0.08); border:1px solid rgba(255,226,64,0.2); color:var(--yellow);
}
.dot { width:5px; height:5px; border-radius:50%; background:var(--yellow); animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.songs-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.song-item { cursor:pointer; }

.song-thumb-wrap {
  aspect-ratio:1; border-radius:10px; overflow:hidden;
  border:1.5px solid var(--border); background:var(--s2);
  position:relative; transition:transform 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.song-thumb-wrap:hover { transform:translateY(-3px); border-color:rgba(255,45,107,0.4); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.song-item.selected .song-thumb-wrap { border-color:var(--pink); box-shadow:0 0 0 2px var(--pink), 0 0 20px rgba(255,45,107,0.3); }
.song-thumb { width:100%; height:100%; object-fit:cover; display:block; }
.song-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:22px; background:repeating-linear-gradient(45deg,var(--s2),var(--s2) 5px,var(--s3) 5px,var(--s3) 10px); }

.rank-pin { position:absolute; top:5px; left:5px; width:20px; height:20px; border-radius:50%; font-family:'Bebas Neue',sans-serif; font-size:12px; display:flex; align-items:center; justify-content:center; }
.rank-1 { background:var(--yellow); color:#000; box-shadow:0 0 10px rgba(255,226,64,0.7); }
.rank-2 { background:#b8c0cc; color:#000; }
.rank-3 { background:#c8763a; color:#fff; }

.selected-check { position:absolute; inset:0; background:rgba(255,45,107,0.2); display:flex; align-items:center; justify-content:center; font-size:24px; backdrop-filter:blur(2px); }
.song-name { font-size:10px; color:var(--muted); text-align:center; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-item.selected .song-name { color:var(--pink); }
.song-owner { font-size:9px; color:var(--cyan); text-align:center; margin-top:2px; opacity:0.7; }

.ranking-list { display:flex; flex-direction:column; gap:7px; }
.rank-row { display:grid; grid-template-columns:30px 34px 1fr auto; align-items:center; gap:10px; padding:10px 12px; background:var(--s2); border-radius:10px; border:1px solid var(--border); transition:border-color 0.15s,background 0.15s; animation:fadeUp 0.3s ease both; }
.rank-row:hover { border-color:rgba(255,255,255,0.1); background:var(--s3); }
.rank-num { font-family:'Bebas Neue',sans-serif; font-size:18px; text-align:center; color:var(--muted); }
.rank-num.top { color:var(--yellow); text-shadow:0 0 10px rgba(255,226,64,0.5); }
.rank-num.s2  { color:#b8c0cc; }
.rank-num.s3  { color:#c8763a; }
.rank-avatar { width:34px; height:34px; border-radius:7px; background:var(--s3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; overflow:hidden; }
.rank-avatar img { width:100%; height:100%; object-fit:cover; }
.rank-info { min-width:0; }
.rank-player { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-song   { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.rank-score { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--cyan); letter-spacing:1px; white-space:nowrap; }
.rank-score.top { color:var(--yellow); text-shadow:0 0 8px rgba(255,226,64,0.4); }

/* ── 시작 버튼 ── */
.start-wrap { display:flex; flex-direction:column; gap:8px; }

.start-hint {
  text-align:center; font-size:10px; letter-spacing:1px;
  min-height:16px; transition:color 0.3s;
  color: var(--muted);
}
.start-hint.c-cyan   { color:var(--cyan); }
.start-hint.c-pink   { color:var(--pink); }
.start-hint.c-yellow { color:var(--yellow); }

.start-btn {
  width:100%; padding:17px; border-radius:14px;
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:5px;
  position:relative; overflow:hidden;
  transition: all 0.35s cubic-bezier(0.34,1.2,0.64,1);

  /* 비활성 */
  background: var(--s2);
  color: var(--muted);
  border: 1.5px solid var(--border);
  box-shadow: none;
  cursor: not-allowed;
}

.start-btn.active {
  background: linear-gradient(135deg, var(--pink) 0%, #ff6040 100%);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 6px 28px rgba(255,45,107,0.35);
  cursor: pointer;
  animation: btnPulse 2.5s ease infinite;
}

.start-btn.active::before {
  content:''; position:absolute; top:0; left:-100%;
  width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left 0.5s;
}
.start-btn.active:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(255,45,107,0.55); animation:none; }
.start-btn.active:hover::before { left:150%; }
.start-btn.active:active { transform:translateY(0); }

@keyframes btnPulse {
  0%,100% { box-shadow:0 6px 28px rgba(255,45,107,0.35); }
  50%      { box-shadow:0 6px 40px rgba(255,45,107,0.6); }
}

/* ══ 게임 화면 ══ */
#screen-game {
  display:none; width:100%; max-width:980px;
  flex-direction:column; align-items:center; justify-content:center;
  gap:32px; position:relative; z-index:1;
  animation:fadeUp 0.4s ease both; min-height:80vh;
}

#yt-player-wrap { position:absolute; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none; top:0; left:0; }

.game-player { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
.game-song-info { text-align:center; }
.game-song-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; color:var(--text); margin-bottom:6px; }
.game-song-channel { font-size:12px; color:var(--muted); letter-spacing:2px; }

.game-timer { font-family:'Bebas Neue',sans-serif; font-size:80px; letter-spacing:4px; line-height:1; color:var(--text); transition:color 0.3s; }
.game-timer.warning { color:var(--yellow); }
.game-timer.danger  { color:var(--pink); animation:timerPulse 0.5s infinite alternate; }
@keyframes timerPulse { from{opacity:1} to{opacity:0.6} }

.music-bar-wrap { width:100%; max-width:560px; background:var(--s1); border:1px solid var(--border); border-radius:20px; padding:20px 24px; position:relative; overflow:hidden; }
.music-bar-wrap::before { content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0.5; }

.waveform { display:flex; align-items:center; justify-content:center; gap:4px; height:48px; margin-bottom:16px; }
.wave-bar { width:4px; background:var(--cyan); border-radius:2px; animation:wave 1s ease-in-out infinite alternate; box-shadow:0 0 8px rgba(0,229,200,0.4); }
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.08s}.wave-bar:nth-child(3){animation-delay:.16s}.wave-bar:nth-child(4){animation-delay:.24s}.wave-bar:nth-child(5){animation-delay:.32s}.wave-bar:nth-child(6){animation-delay:.40s}.wave-bar:nth-child(7){animation-delay:.48s}.wave-bar:nth-child(8){animation-delay:.56s}.wave-bar:nth-child(9){animation-delay:.64s}.wave-bar:nth-child(10){animation-delay:.72s}.wave-bar:nth-child(11){animation-delay:.80s}.wave-bar:nth-child(12){animation-delay:.88s}.wave-bar:nth-child(13){animation-delay:.96s}.wave-bar:nth-child(14){animation-delay:.72s}.wave-bar:nth-child(15){animation-delay:.56s}.wave-bar:nth-child(16){animation-delay:.40s}.wave-bar:nth-child(17){animation-delay:.24s}.wave-bar:nth-child(18){animation-delay:.08s}
.waveform.paused .wave-bar { animation-play-state:paused; }
@keyframes wave { from{height:6px;opacity:0.4} to{height:40px;opacity:1} }

.progress-wrap { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.progress-time { font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--muted); letter-spacing:1px; white-space:nowrap; min-width:36px; }
.progress-bar { flex:1; height:4px; background:var(--s3); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--pink)); border-radius:2px; transition:width 0.5s linear; box-shadow:0 0 8px rgba(0,229,200,0.5); }

.controls { display:flex; align-items:center; justify-content:center; gap:12px; }
.ctrl-btn { background:var(--s2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; padding:10px 20px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:background 0.15s,border-color 0.15s; letter-spacing:1px; }
.ctrl-btn:hover { background:var(--s3); border-color:rgba(255,255,255,0.12); }
.ctrl-btn.exit { background:rgba(255,45,107,0.1); border-color:rgba(255,45,107,0.2); color:var(--pink); }
.ctrl-btn.exit:hover { background:rgba(255,45,107,0.2); border-color:var(--pink); }

@media (max-width:700px) {
  #screen-lobby { grid-template-columns:1fr; }
  .left { align-items:center; padding-right:0; padding-bottom:28px; }
  .logo { font-size:80px; }
  .songs-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ══ 로비 ══ -->
<div id="screen-lobby">
  <div class="left">
    <div class="logo">BEAT<br>DROP</div>
    <div class="logo-sub">리듬에 몸을 맡겨라</div>
    <div class="logo-deco"></div>
  </div>

  <div class="right">
    <div class="input-card">
      <div class="inp-row">
        <div class="inp-wrap link-wrap" id="wrap-link">
          <span class="inp-icon">🎵</span>
          <input class="inp" id="inp-link" type="text" placeholder="유튜브 링크를 붙여넣어 주세요" oninput="onLinkInput(this)">
          <span class="inp-check">✓</span>
        </div>
        <div class="inp-wrap name-wrap" id="wrap-name">
          <span class="inp-icon">👤</span>
          <input class="inp" id="inp-name" type="text" placeholder="닉네임" oninput="onNameInput(this)">
          <span class="inp-check">✓</span>
        </div>
      </div>

      <!-- 스텝 -->
      <div class="step-row">
        <div class="step s-link" id="step-link"><div class="step-dot"></div><span>링크 입력</span></div>
        <div class="step-line l1" id="line1"></div>
        <div class="step s-name" id="step-name"><div class="step-dot"></div><span>닉네임</span></div>
        <div class="step-line l2" id="line2"></div>
        <div class="step s-go"   id="step-go">  <div class="step-dot"></div><span>게임 시작</span></div>
      </div>
    </div>

    <div class="tab-wrap">
      <div class="tab-header">
        <button class="tab-btn active" id="tab-songs" onclick="switchTab('songs')">🎶 곡 선택</button>
        <button class="tab-btn" id="tab-rank" onclick="switchTab('rank')">🏆 랭킹 TOP 10</button>
      </div>
      <div class="tab-panel active" id="panel-songs">
        <div class="panel-header">
          <span class="panel-label">추천곡</span>
          <div class="panel-line"></div>
          <div class="mode-badge"><span class="dot"></span><span>순위권</span></div>
        </div>
        <div class="songs-grid" id="songs-grid"></div>
      </div>
      <div class="tab-panel" id="panel-rank">
        <div class="panel-header">
          <span class="panel-label">전체 랭킹</span>
          <div class="panel-line"></div>
        </div>
        <div class="ranking-list" id="rank-list"></div>
      </div>
    </div>

    <div class="start-wrap">
      <div class="start-hint" id="start-hint">유튜브 링크를 입력하거나 곡을 선택해주세요</div>
      <button class="start-btn" id="start-btn" onclick="startGame()">게임 시작</button>
    </div>
  </div>
</div>

<!-- ══ 게임 화면 ══ -->
<div id="screen-game">
  <div id="yt-player-wrap"><div id="yt-player"></div></div>
  <div class="game-player" id="game-player-name"></div>
  <div class="game-song-info">
    <div class="game-song-title" id="game-song-title">로딩 중...</div>
    <div class="game-song-channel" id="game-song-channel"></div>
  </div>
  <div class="game-timer" id="game-timer">01:00</div>
  <div class="music-bar-wrap">
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div class="progress-wrap">
      <span class="progress-time" id="progress-elapsed">0:00</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-time">1:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-playpause" onclick="togglePlay()">⏸ 일시정지</button>
      <button class="ctrl-btn exit" onclick="exitGame()">✕ 나가기</button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const rankedPlaylist = [
  { id:'dQw4w9WgXcQ', name:'Never Gonna Give You Up', owner:'리듬킹',    rank:1 },
  { id:'kJQP7kiw5Fk', name:'Despacito',               owner:'댄서99',    rank:2 },
  { id:'RgKAFK5djSk', name:'See You Again',            owner:'음악러버',  rank:3 },
  { id:'JGwWNGJdvx8', name:'Uptown Funk',              owner:'비트마스터',rank:null },
];
const rankingData = [
  {rank:1,name:'리듬킹',song:'Never Gonna',score:9820,thumb:'dQw4w9WgXcQ'},
  {rank:2,name:'댄서99',song:'Despacito',score:9540,thumb:'kJQP7kiw5Fk'},
  {rank:3,name:'음악러버',song:'See You Again',score:9210,thumb:'RgKAFK5djSk'},
  {rank:4,name:'비트마스터',song:'Uptown Funk',score:8990,thumb:'JGwWNGJdvx8'},
  {rank:5,name:'플로우킹',song:'Shape of You',score:8760,thumb:'JGwWNGJdvx8'},
  {rank:6,name:'groove_k',song:'Blinding Lights',score:8530,thumb:'dQw4w9WgXcQ'},
  {rank:7,name:'스텝퀸',song:'Dynamite',score:8310,thumb:'kJQP7kiw5Fk'},
  {rank:8,name:'하이킥',song:'Permission to Dance',score:8050,thumb:'RgKAFK5djSk'},
  {rank:9,name:'neon_boy',song:'Levitating',score:7820,thumb:'JGwWNGJdvx8'},
  {rank:10,name:'파워무브',song:'As It Was',score:7600,thumb:'dQw4w9WgXcQ'},
];

let selectedIdx=null, hasLink=false, hasName=false;
let ytPlayer=null, ytReady=false, gameTimerInterval=null, gameSeconds=60, isPlaying=false;

const thumb = id => `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

function extractVideoId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function onLinkInput(el) {
  hasLink = el.value.trim().length > 0;
  document.getElementById('wrap-link').classList.toggle('filled', hasLink);
  if (hasLink) { selectedIdx = null; renderSongs(); }
  updateState();
}

function onNameInput(el) {
  hasName = el.value.trim().length > 0;
  document.getElementById('wrap-name').classList.toggle('filled', hasName);
  updateState();
}

function updateState() {
  const songReady = hasLink || selectedIdx !== null;
  const canStart  = songReady && hasName;

  // 스텝 닷
  document.getElementById('step-link').classList.toggle('done', songReady);
  document.getElementById('line1').classList.toggle('done', songReady);
  document.getElementById('step-name').classList.toggle('done', hasName);
  document.getElementById('line2').classList.toggle('done', canStart);
  document.getElementById('step-go').classList.toggle('done', canStart);

  // 버튼
  const btn = document.getElementById('start-btn');
  btn.classList.toggle('active', canStart);
  btn.disabled = !canStart;

  // 힌트
  const hint = document.getElementById('start-hint');
  if (canStart) {
    hint.textContent = '✨ 준비 완료! 게임을 시작하세요';
    hint.className = 'start-hint c-yellow';
  } else if (songReady) {
    hint.textContent = '닉네임을 입력해주세요';
    hint.className = 'start-hint c-pink';
  } else if (hasName) {
    hint.textContent = '유튜브 링크를 입력하거나 곡을 선택해주세요';
    hint.className = 'start-hint c-cyan';
  } else {
    hint.textContent = '유튜브 링크를 입력하거나 곡을 선택해주세요';
    hint.className = 'start-hint';
  }
}

function renderSongs() {
  const grid = document.getElementById('songs-grid');
  grid.innerHTML = '';
  rankedPlaylist.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'song-item' + (selectedIdx===i?' selected':'');
    item.style.cssText = `animation:fadeUp .3s ease both;animation-delay:${i*.06}s`;
    item.onclick = () => selectSong(i);

    const tw = document.createElement('div'); tw.className='song-thumb-wrap';
    const img = document.createElement('img'); img.className='song-thumb'; img.src=thumb(song.id); img.alt=song.name;
    img.onerror = () => { tw.innerHTML=`<div class="song-placeholder">🎵</div>`; };
    tw.appendChild(img);

    if (song.rank) { const p=document.createElement('div'); p.className=`rank-pin rank-${song.rank}`; p.textContent=song.rank; tw.appendChild(p); }
    if (selectedIdx===i) { const c=document.createElement('div'); c.className='selected-check'; c.textContent='✓'; tw.appendChild(c); }

    item.appendChild(tw);
    const n=document.createElement('div'); n.className='song-name'; n.textContent=song.name; item.appendChild(n);
    if (song.owner) { const o=document.createElement('div'); o.className='song-owner'; o.textContent='@'+song.owner; item.appendChild(o); }
    grid.appendChild(item);
  });
}

function selectSong(i) {
  selectedIdx = selectedIdx===i ? null : i;
  if (selectedIdx !== null) {
    document.getElementById('inp-link').value='';
    hasLink=false;
    document.getElementById('wrap-link').classList.remove('filled');
  }
  renderSongs();
  updateState();
}

function renderRanking() {
  const list = document.getElementById('rank-list');
  if (list.children.length) return;
  rankingData.forEach((r,i) => {
    const row=document.createElement('div'); row.className='rank-row'; row.style.cssText=`animation-delay:${i*.04}s`;
    const nc=r.rank===1?'rank-num top':r.rank===2?'rank-num s2':r.rank===3?'rank-num s3':'rank-num';
    const sc=r.rank===1?'rank-score top':'rank-score';
    row.innerHTML=`<div class="${nc}">${r.rank}</div><div class="rank-avatar"><img src="${thumb(r.thumb)}" onerror="this.parentNode.textContent='🕹️'"></div><div class="rank-info"><div class="rank-player">${r.name}</div><div class="rank-song">🎵 ${r.song}</div></div><div class="${sc}">${r.score.toLocaleString()}</div>`;
    list.appendChild(row);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='rank') renderRanking();
}

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height:'1', width:'1',
    playerVars:{autoplay:0,controls:0},
    events:{
      onReady: ()=>{ ytReady=true; },
      onStateChange: (e)=>{
        if (e.data===YT.PlayerState.PLAYING) { isPlaying=true; document.getElementById('waveform').classList.remove('paused'); document.getElementById('btn-playpause').textContent='⏸ 일시정지'; }
        else if (e.data===YT.PlayerState.PAUSED) { isPlaying=false; document.getElementById('waveform').classList.add('paused'); document.getElementById('btn-playpause').textContent='▶ 재생'; }
      },
      onError: ()=>exitGame()
    }
  });
}

function startGame() {
  const link = document.getElementById('inp-link').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  const song = selectedIdx!==null ? rankedPlaylist[selectedIdx] : null;
  if (!ytReady) { alert('플레이어 초기화 중입니다. 잠시 후 다시 시도해주세요.'); return; }

  const videoId = song ? song.id : extractVideoId(link);
  const songTitle = song ? song.name : '직접 입력한 곡';
  if (!videoId) { alert('올바른 유튜브 링크를 입력해주세요'); return; }

  document.getElementById('screen-lobby').style.display='none';
  document.getElementById('screen-game').style.display='flex';
  document.getElementById('game-player-name').textContent='👤 '+name;
  document.getElementById('game-song-title').textContent='로딩 중...';
  document.getElementById('game-song-channel').textContent='';

  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
    .then(r=>r.json())
    .then(d=>{ document.getElementById('game-song-title').textContent=d.title||songTitle; document.getElementById('game-song-channel').textContent=d.author_name||''; })
    .catch(()=>{ document.getElementById('game-song-title').textContent=songTitle; });

  ytPlayer.loadVideoById(videoId);
  const wait = setInterval(()=>{
    const dur=ytPlayer.getDuration();
    if (dur&&dur>0) {
      clearInterval(wait);
      ytPlayer.seekTo(Math.floor(Math.random()*Math.max(0,dur-62)),true);
      ytPlayer.playVideo();
      startTimer();
    }
  },500);
}

function startTimer() {
  gameSeconds=60; updateTimerDisplay();
  if (gameTimerInterval) clearInterval(gameTimerInterval);
  gameTimerInterval = setInterval(()=>{
    gameSeconds--;
    updateTimerDisplay();
    const elapsed=60-gameSeconds;
    document.getElementById('progress-fill').style.width=(elapsed/60*100)+'%';
    document.getElementById('progress-elapsed').textContent=fmt(elapsed);
    const t=document.getElementById('game-timer');
    if (gameSeconds<=5) t.className='game-timer danger';
    else if (gameSeconds<=10) t.className='game-timer warning';
    if (gameSeconds===5) fadeOut();
    if (gameSeconds<=0) { clearInterval(gameTimerInterval); setTimeout(()=>exitGame(),1000); }
  },1000);
}

function updateTimerDisplay() {
  const m=Math.floor(gameSeconds/60), s=gameSeconds%60;
  document.getElementById('game-timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmt(sec) { return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }

function fadeOut() {
  let v=100;
  const f=setInterval(()=>{ v-=5; if(v<=0){ytPlayer.setVolume(0);ytPlayer.pauseVideo();clearInterval(f);}else ytPlayer.setVolume(v); },250);
}

function togglePlay() {
  if (!ytPlayer) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function exitGame() {
  if (gameTimerInterval) clearInterval(gameTimerInterval);
  if (ytPlayer) { ytPlayer.stopVideo(); ytPlayer.setVolume(100); }
  gameSeconds=60;
  document.getElementById('game-timer').textContent='01:00';
  document.getElementById('game-timer').className='game-timer';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('progress-elapsed').textContent='0:00';
  document.getElementById('waveform').classList.remove('paused');
  document.getElementById('btn-playpause').textContent='⏸ 일시정지';
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-lobby').style.display='grid';
}

renderSongs();
</script>
</body>
</html>
